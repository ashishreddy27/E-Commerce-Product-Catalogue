<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curate Store</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FAF8F5',
            beige: '#E8DCCF',
            mblack: '#1F1F1F',
            gold: '#C8A97E',
            lgrey: '#F3F3F3'
          },
          fontFamily: {
            heading: ['Cormorant Garamond', 'serif'],
            body: ['Poppins', 'sans-serif']
          }
        }
      }
    }
  </script>

  <style>
    html, body { height: 100%; margin: 0; }
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    .fade-out { animation: fadeOut 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    .slide-up { animation: slideUp 0.5s ease forwards; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(200,169,126,0.2); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(31,31,31,0.08); }
    .btn-primary { transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(200,169,126,0.3); }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1.5px; background: #C8A97E; transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #FAF8F5; }
    ::-webkit-scrollbar-thumb { background: #E8DCCF; border-radius: 3px; }
    body { box-sizing: border-box; }
  </style>
 </head>
 <body class="h-full bg-cream font-body text-mblack overflow-auto">

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="h-full w-full flex">
    <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden items-center justify-center" style="background: linear-gradient(135deg, #1F1F1F 0%, #2a2a2a 100%);">
      <div class="absolute inset-0 opacity-20" style="background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1200'); background-size: cover; background-position: center;"></div>
      <div class="relative z-10 p-16 text-center">
        <h1 class="font-heading text-6xl text-white font-light mb-4" id="loginHeading">Welcome to<br><span class="text-gold font-medium">Curate Store</span></h1>
        <p class="text-beige/80 text-sm tracking-widest uppercase" id="loginTagline">Where luxury meets simplicity</p>
        <div class="mt-12 w-16 h-px bg-gold mx-auto"></div>
      </div>
    </div>
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 bg-cream">
      <div class="glass rounded-2xl p-10 w-full max-w-md shadow-xl fade-in">
        <h2 class="font-heading text-3xl font-medium text-mblack mb-1">Sign In</h2>
        <p class="text-sm text-mblack/50 mb-8">Enter your credentials to continue</p>
        <form id="loginForm" class="space-y-5">
          <div>
            <label for="email" class="text-xs uppercase tracking-wider text-mblack/60 mb-1 block">Email</label>
            <input type="email" id="email" value="hello@curate.com" class="w-full px-4 py-3 rounded-lg bg-lgrey border border-beige/50 focus:outline-none focus:border-gold transition text-sm" placeholder="your@email.com">
          </div>
          <div>
            <label for="password" class="text-xs uppercase tracking-wider text-mblack/60 mb-1 block">Password</label>
            <input type="password" id="password" value="password" class="w-full px-4 py-3 rounded-lg bg-lgrey border border-beige/50 focus:outline-none focus:border-gold transition text-sm" placeholder="••••••••">
          </div>
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 rounded border-beige accent-gold">
              <span class="text-xs text-mblack/60">Remember me</span>
            </label>
            <a href="#" onclick="showForgotPassword();return false;" class="text-xs text-gold hover:underline">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary w-full py-3.5 bg-mblack text-white rounded-lg text-sm font-medium tracking-wide hover:bg-gold">Sign In</button>
        </form>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden w-full h-full flex flex-col">
    <nav class="w-full bg-white/90 backdrop-blur-md border-b border-beige/30 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="#" class="font-heading text-2xl font-medium text-mblack" id="navBrand" onclick="showPage('home')">Curate</a>
        <div class="hidden md:flex items-center gap-8">
          <a class="nav-link text-sm cursor-pointer" onclick="showPage('home')">Home</a>
          <a class="nav-link text-sm cursor-pointer" onclick="showPage('collections')">Collections</a>
          <a class="nav-link text-sm cursor-pointer" onclick="showPage('orders')">Orders</a>
          <a class="nav-link text-sm cursor-pointer" onclick="showPage('history')">History</a>
          <a id="adminNavLink" class="hidden nav-link text-sm cursor-pointer text-gold" onclick="showPage('admin')">Admin</a>
        </div>
        <div class="flex items-center gap-5">
          <button class="relative" onclick="showPage('wishlist')">
            <i data-lucide="heart" class="w-5 h-5"></i>
            <span id="wishCount" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-gold text-white text-[10px] rounded-full flex items-center justify-center">0</span>
          </button>
          <button class="relative" onclick="showPage('compare')">
            <i data-lucide="git-compare" class="w-5 h-5"></i>
            <span id="compareCount" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-gold text-white text-[10px] rounded-full flex items-center justify-center">0</span>
          </button>
          <button class="relative" onclick="showPage('cart')">
            <i data-lucide="shopping-bag" class="w-5 h-5"></i>
            <span id="cartCount" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-gold text-white text-[10px] rounded-full flex items-center justify-center">0</span>
          </button>
          <div class="relative">
            <button onclick="toggleProfile()" class="w-8 h-8 rounded-full bg-beige flex items-center justify-center">
              <i data-lucide="user" class="w-4 h-4"></i>
            </button>
            <div id="profileDrop" class="hidden absolute right-0 top-11 w-48 bg-white rounded-xl shadow-lg border border-beige/30 py-2 z-50">
              <a class="block px-4 py-2 text-sm hover:bg-lgrey cursor-pointer" onclick="showPage('orders');toggleProfile()">My Orders</a>
              <a class="block px-4 py-2 text-sm hover:bg-lgrey cursor-pointer" onclick="showPage('wishlist');toggleProfile()">Wishlist</a>
              <a class="block px-4 py-2 text-sm hover:bg-lgrey cursor-pointer" onclick="showPage('account');toggleProfile()">Account Settings</a>
              <a class="block px-4 py-2 text-sm hover:bg-lgrey cursor-pointer" onclick="showPage('history');toggleProfile()">Browse History</a>
              <a class="block px-4 py-2 text-sm hover:bg-lgrey cursor-pointer" onclick="showPage('compare');toggleProfile()">Compare Products</a>
              <div class="border-t border-beige/30 my-1"></div>
              <a id="adminDropItem" class="hidden px-4 py-2 text-sm text-gold hover:bg-lgrey cursor-pointer font-medium" onclick="showPage('admin');toggleProfile()">⚙ Admin Panel</a>
              <div class="border-t border-beige/30 my-1"></div>
              <a class="block px-4 py-2 text-sm text-red-500 hover:bg-lgrey cursor-pointer" onclick="logout()">Logout</a>
            </div>
          </div>
        </div>
      </div>
    </nav>
    <div id="appContent" class="flex-1 overflow-auto"></div>
    <div id="compareBar" class="hidden fixed bottom-0 left-0 right-0 bg-mblack z-50 border-t border-white/10"></div>
  </div>

  <!-- React root -->
  <div id="root"></div>

 </body>
</html>
